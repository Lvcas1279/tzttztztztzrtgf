        function savePhoto(date, dataUrl, note = "") {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(["photos"], "readwrite");
                const store = transaction.objectStore("photos");
                const record = { id: "p_" + Date.now(), date, dataUrl, note };
                const req = store.add(record);
                req.onsuccess = () => resolve(record);
                req.onerror = () => reject(req.error);
            });
        }

        function getAllPhotos() {
            return new Promise((resolve, reject) => {
                if (!db) {
                    resolve([]);
                    return;
                }
                const transaction = db.transaction(["photos"], "readonly");
                const store = transaction.objectStore("photos");
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        function deletePhoto(id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(["photos"], "readwrite");
                const store = transaction.objectStore("photos");
                const req = store.delete(id);
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
            });
        }

        function loadState() {
            const raw = localStorage.getItem('svalstats_premium_data');
            if (raw) {
                try {
                    const parsed = JSON.parse(raw);
                    state = { ...state, ...parsed };
                    
                    if (!state.exercises) state.exercises = JSON.parse(JSON.stringify(DEFAULT_EXERCISES));
                    
                    for (const cat in DEFAULT_EXERCISES) {
                        if (!state.exercises[cat]) state.exercises[cat] = {};
                        if (Array.isArray(state.exercises[cat])) {
                            const oldExs = state.exercises[cat];
                            state.exercises[cat] = JSON.parse(JSON.stringify(DEFAULT_EXERCISES[cat]));
                            const defaultSet = new Set();
                            for (const sub in DEFAULT_EXERCISES[cat]) {
                                DEFAULT_EXERCISES[cat][sub].forEach(ex => defaultSet.add(ex));
                            }
                            const customOld = oldExs.filter(ex => !defaultSet.has(ex));
                            if (customOld.length > 0) {
                                state.exercises[cat]["Vlastní cviky"] = customOld;
                            }
                        } else {
                            for (const sub in DEFAULT_EXERCISES[cat]) {
                                if (!state.exercises[cat][sub]) state.exercises[cat][sub] = [];
                                const existing = new Set(state.exercises[cat][sub]);
                                DEFAULT_EXERCISES[cat][sub].forEach(ex => existing.add(ex));
                                state.exercises[cat][sub] = Array.from(existing);
                            }
                        }
                    }

                    if (!state.biometrics) state.biometrics = {};
                    if (!state.history) state.history = {};
                    if (!state.workoutDays) state.workoutDays = [];
                    if (!state.photoDates) state.photoDates = {};
                    if (!state.weeklyGoal) state.weeklyGoal = 3;
                    if (!state.streakOffset) state.streakOffset = 0; 
                    if (!state.homeLayout) state.homeLayout = JSON.parse(JSON.stringify(DEFAULT_HOME_LAYOUT));
                    
                    if (state.currentTab === 'nastaveni' || state.currentTab === 'editor') state.currentTab = 'domu'; 

                    const stateIds = state.homeLayout.map(w => w.id);
                    DEFAULT_HOME_LAYOUT.forEach(dw => {
                        if (!stateIds.includes(dw.id)) state.homeLayout.push(dw);
                    });

                    state.workoutDays.forEach((day, idx) => {
                        if (!day.color) day.color = AVAILABLE_COLORS[idx % AVAILABLE_COLORS.length];
                        day.exercises = day.exercises.map(ex => {
                            if (typeof ex === 'string') return { name: ex, targetSets: 4 };
                            return ex;
                        });
                    });
                } catch (e) {
                    console.error("Failed to parse local state", e);
                }
            }
        }

        function getLastWeightForExercise(ex) {
            const sortedDates = Object.keys(state.history).sort().reverse();
            for (const date of sortedDates) {
                for (const dayId in state.history[date]) {
                    if (state.history[date][dayId][ex] && state.history[date][dayId][ex].length > 0) {
                        const sets = state.history[date][dayId][ex];
                        const bestSet = sets.reduce((max, set) => set.weight > max.weight ? set : max, { weight: 0, reps: 0 });
                        return bestSet.weight > 0 ? bestSet.weight : null;
                    }
                }
            }
            return null;
        }

        function getStreakData() {
            const goal = state.weeklyGoal || 3;
            const now = new Date();
            const dayOfWeek = now.getDay() || 7; 
            const startOfWeek = new Date(now);
            startOfWeek.setDate(now.getDate() - dayOfWeek + 1);
            startOfWeek.setHours(0,0,0,0);

            const sortedDates = Object.keys(state.history).sort((a,b) => b.localeCompare(a));
            
            let uniqueDaysThisWeek = new Set();
            for (let d of sortedDates) {
                let [y,m,day] = d.split('-');
                let dateObj = new Date(y, m-1, day);
                if (dateObj >= startOfWeek) {
                    uniqueDaysThisWeek.add(d);
                }
            }
            let currentWeekCount = uniqueDaysThisWeek.size;
            
            let historyStreak = 0;
            let checkStart = new Date(startOfWeek);
            checkStart.setDate(checkStart.getDate() - 7);
            let checkEnd = new Date(startOfWeek);
            checkEnd.setMilliseconds(-1);

            while(true) {
                let countForWeek = 0;
                let uniqueDays = new Set();
                for (let d of sortedDates) {
                    let [y,m,day] = d.split('-');
                    let dateObj = new Date(y, m-1, day);
                    if (dateObj >= checkStart && dateObj <= checkEnd) {
                        uniqueDays.add(d);
                    }
                }
                if (uniqueDays.size >= goal) {
                    historyStreak++;
                    checkStart.setDate(checkStart.getDate() - 7);
                    checkEnd.setDate(checkEnd.getDate() - 7);
                } else {
                    break;
                }
            }
            
            if (currentWeekCount >= goal) historyStreak++;

            let finalStreak = Math.max(0, historyStreak + (state.streakOffset || 0));
            return { currentWeekCount, goal, weeklyStreak: finalStreak };
        }

            if (streak >= 4) return { color: 'text-blue-500', bgGlow: 'bg-blue-500/20', flameGlow: 'drop-shadow-[0_0_15px_rgba(59,130,246,0.8)]', name: 'Modrý plamen' };

        function getNeglectedMusclesThisWeek() {
            const now = new Date();
            const dayOfWeek = now.getDay() || 7;
            const startOfWeek = new Date(now);
            startOfWeek.setDate(now.getDate() - dayOfWeek + 1);
            startOfWeek.setHours(0,0,0,0);

            let hitCategories = new Set();
            const exToCatMap = buildExToCatMap();

            for (const date in state.history) {
                let [y,m,day] = date.split('-');
                let dateObj = new Date(y, m-1, day);
                if (dateObj >= startOfWeek) {
                    for (const dayId in state.history[date]) {
                        for (const ex in state.history[date][dayId]) {
                            if (ex === '_notes') continue;
                            const cat = exToCatMap[ex] || 'Ostatní';
                            hitCategories.add(cat);

                }
            }

            return EXERCISE_CATEGORIES.filter(cat => !hitCategories.has(cat));

                                <button onclick="moveDraftWidget(${idx}, -1)" class="w-12 h-10 rounded-xl bg-white/5 flex items-center justify-center active:scale-90 transition-all ${idx === 0 ? 'opacity-30 cursor-not-allowed' : 'text-white'}" ${idx === 0 ? 'disabled' : ''}>
                                    <i class="ph-bold ph-caret-up text-lg"></i>
                                </button>
                                <button onclick="moveDraftWidget(${idx}, 1)" class="w-12 h-10 rounded-xl bg-white/5 flex items-center justify-center active:scale-90 transition-all ${idx === window.homeLayoutDraft.length - 1 ? 'opacity-30 cursor-not-allowed' : 'text-white'}" ${idx === window.homeLayoutDraft.length - 1 ? 'disabled' : ''}>
                                    <i class="ph-bold ph-caret-down text-lg"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            const html = `
                <div class="space-y-4">
                    <div class="flex justify-between items-start px-2">
                        <div>
                            <span class="text-[11px] text-iosTeal uppercase font-black tracking-widest block">Přizpůsobení</span>
                            <h3 class="text-2xl font-extrabold text-white mt-1">Editor plochy</h3>
                        </div>
                        <button onclick="closeRollout()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 text-slate-400 active:opacity-50 transition-opacity">
                            <i class="ph-bold ph-x text-lg"></i>
                        </button>
                    </div>
                    <p class="text-sm text-slate-400 font-medium px-2">Přesuňte widgety, změňte jejich velikost nebo je skryjte podle svých potřeb.</p>
                    <div class="max-h-[60vh] overflow-y-auto no-scrollbar pb-4 pt-2" style="-webkit-overflow-scrolling: touch;">
                        ${listHtml}
                    </div>
                    <button onclick="saveHomeLayout()" class="w-full py-5 rounded-[1.5rem] bg-iosTeal text-black font-extrabold text-lg active:opacity-50 transition-opacity shadow-lg shadow-iosTeal/20">
                        Uložit rozložení
                    </button>
                </div>
            `;
            openRollout(html, true); 
        };

        window.toggleDraftWidgetVis = (idx) => { window.homeLayoutDraft[idx].visible = !window.homeLayoutDraft[idx].visible; renderHomeLayoutEditor(); };
        window.toggleDraftWidgetSize = (idx) => { 
            const sizes = ['full', 'half', 'quarter'];
            const currentSize = window.homeLayoutDraft[idx].size || 'full';
            const currIdx = sizes.indexOf(currentSize);
            window.homeLayoutDraft[idx].size = sizes[(currIdx + 1) % sizes.length];
            renderHomeLayoutEditor(); 
        };
        window.moveDraftWidget = (idx, shift) => {
            const target = idx + shift;
            if (target >= 0 && target < window.homeLayoutDraft.length) {
                const temp = window.homeLayoutDraft[idx];
                window.homeLayoutDraft[idx] = window.homeLayoutDraft[target];
                window.homeLayoutDraft[target] = temp;
                renderHomeLayoutEditor();
            }
        };
        window.saveHomeLayout = () => {
            state.homeLayout = window.homeLayoutDraft;
            saveState();
            closeRollout();
            renderView();
            showToast("Rozložení uloženo");
        };

        function renderDomuView(container) {
            const streakData = getStreakData();
            const progressPercent = Math.min(100, (streakData.currentWeekCount / streakData.goal) * 100);
            
            const isGoalMet = streakData.currentWeekCount >= streakData.goal;
            const visuals = getStreakVisuals(streakData.weeklyStreak);
            const streakColor = isGoalMet ? visuals.color : 'text-slate-400';
            const flameGlow = isGoalMet ? visuals.flameGlow : '';
            const bgGlow = isGoalMet ? visuals.bgGlow : 'bg-iosAmber/10';

            let lastWeight = '--';
            let lastWeightDate = '';
            const bioDates = Object.keys(state.biometrics).sort((a,b) => b.localeCompare(a));
            for(let d of bioDates) {
                if(state.biometrics[d]['vaha'] !== undefined) {
                    lastWeight = state.biometrics[d]['vaha'] + ' kg';
                    lastWeightDate = formatDateCzech(d);
                    break;
                }
            }

            let allPRs = [];
            const loggedExs = new Set();
            for (const d in state.history) {
                for (const dayId in state.history[d]) {
                    for (const ex in state.history[d][dayId]) {
                        if (ex !== '_notes') loggedExs.add(ex);
                    }
                }
            }
            loggedExs.forEach(ex => {
                const pb = getExerciseRecordPB(ex);
                if (pb.weight > 0) allPRs.push({ ex, ...pb });
            });

            if (window.prInterval) clearInterval(window.prInterval);
            if (allPRs.length > 0) {
                setTimeout(() => {
                    const updatePRWidget = () => {
                        const prContainer = document.getElementById('home-pr-widget-content');
                        const prContainerQuarter = document.getElementById('home-pr-widget-content-quarter');
                        if (!prContainer && !prContainerQuarter) return;
                        
                        const randomPR = allPRs[Math.floor(Math.random() * allPRs.length)];
                        
                        if (prContainer) {
                            prContainer.style.opacity = 0;
                            setTimeout(() => {
                                if (document.getElementById('home-pr-widget-content')) {
                                    document.getElementById('home-pr-widget-content').innerHTML = `
                                        <span class="block text-[11px] text-slate-300 font-bold truncate w-full">${randomPR.ex}</span>
                                        <div class="flex items-baseline space-x-1 mt-0.5">
                                            <span class="text-xl font-black text-iosAmber">${randomPR.weight} kg</span>
                                            <span class="text-[10px] text-slate-500 font-bold">x ${randomPR.reps}</span>
                                        </div>
                                    `;
                                    document.getElementById('home-pr-widget-content').style.opacity = 1;
                                }
                            }, 500);
                        }
                        
                        if (prContainerQuarter) {
                            prContainerQuarter.style.opacity = 0;
                            setTimeout(() => {
                                if (document.getElementById('home-pr-widget-content-quarter')) {
                                    document.getElementById('home-pr-widget-content-quarter').textContent = randomPR.ex;
                                    document.getElementById('home-pr-widget-content-quarter').style.opacity = 1;
                                }
                            }, 500);
                        }
                    };

                    updatePRWidget(); 
                    window.prInterval = setInterval(() => {
                        if(document.getElementById('home-pr-widget-content') || document.getElementById('home-pr-widget-content-quarter')) {
                            updatePRWidget();
                        } else {
                            clearInterval(window.prInterval);
                        }
                    }, 10000);
                }, 50);
            }

            const nextDay = getNextWorkoutDay() || state.workoutDays[0];
            const neglected = getNeglectedMusclesThisWeek();

            const daysArr = [];
            for (let i = -4; i <= 2; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                const dayName = d.toLocaleDateString('cs-CZ', { weekday: 'short' }).replace('.', '').substring(0, 2);
                const isToday = i === 0;
                const hasWorkout = state.history[dateStr] && Object.keys(state.history[dateStr]).length > 0;
                daysArr.push({ dateStr, dayName, dayNum: d.getDate(), isToday, hasWorkout });
            }

            const getWidgetHtml = (id, size) => {
                const isQ = size === 'quarter';
                const pClass = isQ ? 'p-3' : (size === 'half' ? 'p-5' : 'p-6');
                
                if (id === 'streak') {
                    if (isQ) {
                        return `
                            <div onclick="openStreakSettings()" class="glass-panel rounded-[2rem] ${pClass} cursor-pointer active:opacity-80 transition-opacity h-full flex flex-col justify-center items-center relative overflow-hidden">
                                <i class="ph-fill ph-fire text-3xl ${streakColor} ${flameGlow}"></i>
                                <span class="font-black text-white mt-1.5">${streakData.currentWeekCount}/${streakData.goal}</span>
                            </div>
                        `;
                    }
                    return `
                        <div onclick="openStreakSettings()" class="glass-panel rounded-[2rem] p-6 relative overflow-hidden cursor-pointer active:opacity-80 transition-opacity group h-full flex flex-col justify-center">
                            <div class="absolute -right-4 -top-4 w-32 h-32 ${bgGlow} rounded-full blur-[40px] pointer-events-none transition-all"></div>
                            <div class="flex justify-between items-start relative z-10">
                                <div>
                                    <div class="flex items-center space-x-2">
                                        <h3 class="text-[11px] font-black uppercase tracking-widest ${streakColor}">Tvůj Týdenní Cíl</h3>
                                    </div>
                                    <div class="text-3xl font-black text-white mt-1">${streakData.currentWeekCount} <span class="text-lg text-slate-500">/ ${streakData.goal}</span></div>
                                    <p class="text-xs text-slate-400 font-bold mt-1">Tréninky tento týden</p>
                                </div>
                                <div class="flex flex-col items-center">
                                    <i class="ph-fill ph-fire text-5xl ${streakColor} ${flameGlow} transition-all duration-500"></i>
                                    <span class="text-sm font-black mt-1 ${streakColor}">${streakData.weeklyStreak} týdnů</span>
                                </div>
                            </div>
                            <div class="w-full bg-white/10 h-3 rounded-full mt-5 overflow-hidden border border-white/5 relative z-10 flex-shrink-0">
                                <div class="h-full bg-gradient-to-r from-white/20 to-white/60 rounded-full transition-all duration-1000 ${isGoalMet ? 'bg-gradient-to-r from-iosAmber to-yellow-300' : ''}" style="width: ${progressPercent}%; ${isGoalMet ? 'background: currentColor;' : ''}"></div>
                            </div>
                            ${isGoalMet && streakData.weeklyStreak >= 4 ? `<div class="mt-3 text-center text-[10px] font-black uppercase tracking-widest ${streakColor} opacity-80 flex-shrink-0">${visuals.name}</div>` : ''}
                        </div>
                    `;
                }

                if (id === 'calendar') {
                    if (isQ) {
                        return `
                            <div onclick="switchTab('kalendar')" class="glass-panel rounded-[2rem] ${pClass} h-full flex flex-col justify-center items-center cursor-pointer active:opacity-50">
                                <i class="ph-bold ph-calendar-blank text-3xl text-iosTeal"></i>
                                <span class="font-black text-white mt-1.5 text-lg">${new Date().getDate()}.</span>
                            </div>
                        `;
                    }
                    const miniCalendarHtml = daysArr.map(d => {
                        let dayClass = 'bg-white/5 border-white/5';
                        let textClassDayName = 'text-slate-500';
                        let textClassDayNum = 'text-slate-400';
                        let marker = '';

                        if (d.isToday) {
                            if (d.hasWorkout) {
                                dayClass = 'bg-iosAmber text-black shadow-lg shadow-iosAmber/30 ring-2 ring-iosAmber';
                                textClassDayName = 'text-black/70';
                                textClassDayNum = 'text-black font-extrabold';
                            } else {
                                dayClass = 'bg-iosTeal text-black shadow-lg shadow-iosTeal/30 ring-2 ring-iosTeal';
                                textClassDayName = 'text-black/70';
                                textClassDayNum = 'text-black font-extrabold';
                            }
                        } else {
                            if (d.hasWorkout) {
                                dayClass = 'bg-iosAmber/15 border-iosAmber/30';
                                textClassDayName = 'text-iosAmber';
                                textClassDayNum = 'text-white font-extrabold';
                                marker = `<span class="absolute bottom-1.5 w-1.5 h-1.5 rounded-full bg-iosAmber shadow-[0_0_5px_#F59E0B]"></span>`;
                            }
                        }
                        
                        return `
                            <div onclick="openDayLogsHistoryRollout('${d.dateStr}')" class="flex flex-col items-center justify-center flex-1 py-3 rounded-[1.2rem] ${dayClass} border relative cursor-pointer active:scale-95 transition-transform">
                                <span class="text-[9px] font-black uppercase mb-0.5 ${textClassDayName}">${d.dayName}</span>
                                <span class="text-sm ${textClassDayNum} z-10">${d.dayNum}</span>
                                ${marker}
                                ${d.isToday && !d.hasWorkout ? `<span class="absolute bottom-1.5 w-1.5 h-1.5 rounded-full bg-black/50"></span>` : ''}
                            </div>
                        `;
                    }).join('');

                    return `
                        <div class="glass-panel rounded-[2rem] p-5 h-full flex flex-col justify-center">
                            <div class="flex items-center justify-between mb-3 px-1">
                                <div class="flex items-center space-x-2 text-iosTeal">
                                    <i class="ph-bold ph-calendar-blank text-base"></i>
                                    <span class="text-[10px] font-black uppercase tracking-widest">Týdenní přehled</span>
                                </div>
                            </div>
                            <div class="flex justify-between space-x-1.5 flex-1">
                                ${miniCalendarHtml}
                            </div>
                        </div>
                    `;
                }

                if (id === 'quickstart') {
                    if (!nextDay) return ``;
                    const colTheme = COLOR_THEMES[nextDay.color] || COLOR_THEMES.cyan;
                    if (isQ) {
                        return `
                            <div onclick="startWorkoutFromHome('${nextDay.id}')" class="glass-panel rounded-[2rem] ${pClass} h-full flex flex-col justify-center items-center cursor-pointer active:opacity-50 transition-opacity">
                                <i class="ph-fill ph-play-circle text-[40px] ${colTheme.text}"></i>
                            </div>
                        `;
                    }
                    return `
                        <div class="glass-panel rounded-[2rem] p-6 h-full flex flex-col justify-center">
                            <span class="text-[11px] text-iosTeal uppercase font-black tracking-widest">Rychlý start</span>
                            <h3 class="text-xl font-bold text-white mt-1">Další na řadě</h3>
                            <div onclick="startWorkoutFromHome('${nextDay.id}')" class="p-4 rounded-[1.5rem] bg-black/40 border border-white/5 active:opacity-50 transition-opacity cursor-pointer mt-3 flex justify-between items-center">
                                <div class="flex items-center space-x-3">
                                    <span class="w-3 h-3 rounded-full" style="background-color: ${colTheme.marker}; box-shadow: 0 0 8px ${colTheme.marker}"></span>
                                    <span class="font-black text-white text-base">${nextDay.name}</span>
                                </div>
                                <i class="ph-fill ph-play-circle text-[24px] ${colTheme.text}"></i>
                            </div>
                        </div>
                    `;
                }

                if (id === 'weight') {
                    if (isQ) {
                        return `
                            <div onclick="switchTab('profil')" class="glass-panel rounded-[2rem] ${pClass} active:opacity-50 transition-opacity cursor-pointer h-full flex flex-col justify-center items-center text-center">
                                <i class="ph-bold ph-scales text-2xl text-iosTeal mb-1.5"></i>
                                <span class="text-sm font-black text-white">${lastWeight.replace(' kg', '')}</span>
                            </div>
                        `;
                    }
                    return `
                        <div onclick="switchTab('profil')" class="glass-panel rounded-[2rem] ${pClass} active:opacity-50 transition-opacity cursor-pointer h-full flex flex-col justify-center">
                            <div class="flex items-center space-x-2 text-iosTeal mb-2">
                                <i class="ph-bold ph-scales text-lg"></i>
                                <span class="text-[10px] font-black uppercase tracking-widest">Aktuální váha</span>
                            </div>
                            <div class="text-2xl font-black text-white mt-2">${lastWeight}</div>
                            <div class="text-[10px] text-slate-500 font-bold mt-1">${lastWeightDate || 'Zatím nezadáno'}</div>
                        </div>
                    `;
                }

                if (id === 'records') {
                    if (isQ) {
                        return `
                            <div onclick="switchTab('rekordy')" class="glass-panel rounded-[2rem] ${pClass} active:opacity-50 transition-opacity cursor-pointer h-full flex flex-col justify-center items-center text-center overflow-hidden">
                                <i class="ph-bold ph-medal text-2xl text-iosAmber mb-1.5"></i>
                                ${allPRs.length > 0 ? `<div id="home-pr-widget-content-quarter" class="w-full truncate text-[10px] font-bold text-white transition-opacity duration-500 px-1"></div>` : `<span class="text-[10px] text-slate-500">Žádné</span>`}
                            </div>
                        `;
                    }
                    return `
                        <div onclick="switchTab('rekordy')" class="glass-panel rounded-[2rem] p-5 active:opacity-50 transition-opacity cursor-pointer flex flex-col justify-between h-full">
                            <div class="flex items-center space-x-2 text-iosAmber mb-2">
                                <i class="ph-bold ph-medal text-lg"></i>
                                <span class="text-[10px] font-black uppercase tracking-widest">Rekordy</span>
                            </div>
                            ${allPRs.length > 0 ? `<div id="home-pr-widget-content" class="mt-2 text-left h-[48px] flex flex-col justify-center transition-opacity duration-500"></div>` : `<div class="text-sm font-bold text-slate-300 mt-2 leading-tight">Prozkoumej své<br>nejlepší výkony</div>`}
                        </div>
                    `;
                }

                if (id === 'neglected') {
                    if (isQ) {
                        return `
                            <div class="glass-panel rounded-[2rem] ${pClass} h-full flex flex-col justify-center items-center text-center ${neglected.length === 0 ? 'bg-iosGreen/5 border-iosGreen/20' : ''}">
                                ${neglected.length === 0 
                                    ? `<i class="ph-fill ph-check-circle text-[32px] text-iosGreen"></i>` 
                                    : `<i class="ph-fill ph-warning text-[28px] text-iosRed mb-1"></i><span class="text-sm font-black text-white">${neglected.length}</span>`
                                }
                            </div>
                        `;
                    }
                    
                    if (neglected.length === 0) {
                        return `
                            <div class="glass-panel rounded-[2rem] p-6 h-full flex flex-col justify-center relative overflow-hidden border border-iosGreen/20 bg-iosGreen/5">
                                <div class="absolute -right-4 -top-4 w-32 h-32 bg-iosGreen/20 rounded-full blur-[40px] pointer-events-none"></div>
                                <div class="relative z-10">
                                    <span class="text-[11px] text-iosGreen uppercase font-black tracking-widest">Tip pro tento týden</span>
                                    <h3 class="text-lg font-bold text-white mt-1">Vše odcvičeno! 🎉</h3>
                                    <p class="text-[12px] text-slate-300 mt-1.5 leading-relaxed font-medium">Skvělá práce! Úspěšně jsi zasáhl všechny svalové partie. V pondělí začínáme nanovo.</p>
                                    <div class="mt-4 flex items-center space-x-2 text-iosGreen font-bold text-sm">
                                        <i class="ph-fill ph-check-circle text-xl"></i>
                                        <span>Kompletní týdenní cyklus</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    } else {
                        let neglectedPills = `<div class="flex flex-wrap gap-2 mt-3">` + neglected.map(m => `<span class="px-3 py-1.5 bg-white/5 border border-white/10 rounded-xl text-[11px] font-bold text-slate-300 shadow-sm">${m}</span>`).join('') + `</div>`;
                        return `
                            <div class="glass-panel rounded-[2rem] p-6 h-full flex flex-col justify-center">
                                <span class="text-[11px] text-iosRed uppercase font-black tracking-widest">Tip pro tento týden</span>
                                <h3 class="text-lg font-bold text-white mt-1">Zanedbané svaly</h3>
                                <p class="text-[11px] text-slate-400 mt-1 leading-tight">Zatím jsi od pondělí neprocvičil tyto partie:</p>
                                ${neglectedPills}
                            </div>
                        `;
                    }
                }
                return '';
            };

            let layoutHtml = state.homeLayout.filter(w => w.visible).map(w => {
                let sizeClass = 'col-span-4'; 
                if (w.size === 'half') sizeClass = 'col-span-2';
                if (w.size === 'quarter') sizeClass = 'col-span-1';
                return `<div class="${sizeClass} flex flex-col">${getWidgetHtml(w.id, w.size || 'full')}</div>`;
            }).join('');

            container.innerHTML = `
                <div class="space-y-4">
                    <div class="grid grid-cols-4 gap-4 pb-4">
                        ${layoutHtml}
                    </div>
                    <div class="flex justify-center pb-8">
                        <button onclick="openHomeLayoutEditor()" class="px-6 py-4 rounded-full bg-white/5 border border-white/10 text-xs font-bold text-slate-400 flex items-center space-x-2 active:opacity-50 transition-all shadow-sm">
                            <i class="ph-bold ph-faders text-base"></i>
                            <span>Upravit rozložení plochy</span>
                        </button>
                    </div>
                </div>
            `;
        }

        function getMetricHistory(metricId) {
            const history = [];
            for (const date in state.biometrics) {
                if (state.biometrics[date][metricId] !== undefined) {
                    history.push({ date, val: state.biometrics[date][metricId] });
                }
            }
            return history.sort((a, b) => b.date.localeCompare(a.date));
        }

        function calculateBiometricTrend(metricId) {
            const hist = getMetricHistory(metricId);
            if (hist.length < 2) return 0;
            return hist[0].val - hist[1].val;
        }

        function renderProfilView(container) {
            let metricsHtml = BIOMETRICS_CONFIG.map(metric => {
                const hist = getMetricHistory(metric.id);
                const lastEntry = hist.length > 0 ? hist[0] : null;
                const currentVal = lastEntry ? lastEntry.val : '--';
                const lastDateTxt = lastEntry ? `Zapsáno: ${formatDateCzech(lastEntry.date)}` : 'Zatím nezadáno';

                const trend = calculateBiometricTrend(metric.id);
                let trendIcon = '';
                let trendClass = 'text-slate-500';

                if (trend > 0) {
                    trendIcon = '<i class="ph-bold ph-trend-up text-base"></i>';
                    trendClass = 'text-iosRed';
                } else if (trend < 0) {
                    trendIcon = '<i class="ph-bold ph-trend-down text-base"></i>';
                    trendClass = 'text-iosGreen';
                }

                return `
                    <div onclick="openBiometricRollout('${metric.id}')" class="glass-panel rounded-[1.5rem] p-4 flex flex-col justify-between items-start cursor-pointer active:opacity-50 transition-opacity">
                        <div class="flex items-center space-x-3 mb-2 w-full">
                            <div class="p-2.5 rounded-xl ${metric.bg} ${metric.color}">
                                <i class="ph-bold ph-${metric.icon} text-[20px]"></i>
                            </div>
                            <div class="flex-1">
                                <span class="block text-[13px] font-bold text-slate-200 leading-none">${metric.name}</span>
                                <span class="block text-[10px] text-slate-500 mt-1.5 font-bold">${lastDateTxt}</span>
                            </div>
                        </div>
                        <div class="flex items-baseline space-x-1.5 mt-3">
                            <span class="text-3xl font-black tracking-tight text-white">${currentVal}</span>
                            <span class="text-sm text-slate-500 font-bold">${metric.unit}</span>
                        </div>
                        <div class="flex items-center space-x-1.5 text-xs font-bold ${trendClass} mt-2.5">
                            ${trendIcon}
                            <span>${trend !== 0 ? (trend > 0 ? '+' : '') + trend.toFixed(1) + ' ' + metric.unit : 'Stabilní'}</span>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="space-y-6">
                    <div class="glass-panel rounded-3xl p-5 flex items-center justify-between">
                        <div>
                            <h2 class="text-xl font-black text-iosTeal uppercase tracking-widest mb-1">Přehled a míry</h2>
                            <p class="text-[13px] text-slate-400">Klepnutím na panel upravte a prohlédněte historii.</p>
                        </div>
                        <div class="p-4 bg-white/5 rounded-2xl text-slate-400 text-xs font-semibold text-center">
                            <span class="block text-white font-black text-xl">${new Date().getDate()}</span>
                            <span>${new Date().toLocaleString('cs-CZ', { month: 'short' })}</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        ${metricsHtml}
                    </div>

                    <div class="glass-panel rounded-3xl p-5 space-y-5">
                        <div class="flex items-center justify-between">
                            <div>
                                <h3 class="text-xl font-bold text-white">Fotky pokroku</h3>
                                <p class="text-[13px] text-slate-400 mt-1">Historie s datem pořízení v kalendáři.</p>
                            </div>
                            <button onclick="document.getElementById('profile-photo-upload').click()" class="h-11 w-11 rounded-2xl bg-iosTeal text-black font-extrabold flex items-center justify-center active:opacity-50 transition-opacity shadow-lg shadow-iosTeal/20">
                                <i class="ph-bold ph-camera text-xl"></i>
                            </button>
                            <input type="file" id="profile-photo-upload" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
                        </div>
                        
                        <div id="profile-photos-grid" class="grid grid-cols-3 gap-3">
                            <p class="text-sm text-slate-500 italic py-4 col-span-3 text-center">Načítání galerie...</p>
                        </div>
                    </div>
                </div>
            `;
            loadPhotosAndRender();
        }

        function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max_size = 600; 
                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);

                    window.tempUploadedDataUrl = dataUrl;
                    const today = getToday();
                    const html = `
                        <div class="space-y-6 text-center">
                            <div class="flex justify-between items-start w-full">
                                <div class="w-10"></div>
                                <div class="text-center flex flex-col items-center">
                                    <span class="text-[11px] text-iosTeal uppercase font-black tracking-widest block">Nová fotka pokroku</span>
                                    <h3 class="text-2xl font-extrabold text-white mt-1">Kdy byla pořízena?</h3>
                                </div>
                                <button onclick="closeRollout()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 text-slate-400 active:opacity-50 transition-opacity">
                                    <i class="ph-bold ph-x text-lg"></i>
                                </button>
                            </div>

                            <p class="text-sm text-slate-400 mt-1">Zvolte datum období pro zobrazení v kalendáři.</p>

                            <div class="glass-panel rounded-3xl p-6 space-y-4 flex justify-center">
                                <input type="date" id="photo-period-date" value="${today}" max="${today}" style="text-align: center; -webkit-appearance: none; display: block;" class="w-full py-4 px-5 text-center rounded-2xl bg-white/5 border border-white/10 text-white font-bold text-lg focus:outline-none focus:border-iosTeal transition-colors block appearance-none">
                            </div>

                            <button onclick="saveTempPhotoWithDate()" class="w-full py-5 rounded-2xl bg-iosTeal text-black font-extrabold text-base active:opacity-50 transition-opacity shadow-lg shadow-iosTeal/20">Uložit do kalendáře</button>
                        </div>
                    `;
                    openRollout(html);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.saveTempPhotoWithDate = () => {
            const dateInput = document.getElementById('photo-period-date');
            const dateVal = dateInput ? dateInput.value : getToday();
            const dataUrl = window.tempUploadedDataUrl;
            if (!dataUrl) return;

            savePhoto(dateVal, dataUrl).then(() => {
                if (!state.photoDates) state.photoDates = {};
                state.photoDates[dateVal] = true;
                saveState();
                showToast("Fotka uložena a spárována s kalendářem");
                closeRollout();
                loadPhotosAndRender();
                if (state.currentTab === 'kalendar') renderView();
            }).catch(err => console.error(err));
        };

        function loadPhotosAndRender() {
            getAllPhotos().then(photos => {
                const grid = document.getElementById('profile-photos-grid');
                if (!grid) return;
                if (photos.length === 0) {
                    grid.innerHTML = `<p class="text-sm text-slate-500 italic py-6 col-span-3 text-center">Žádné nahrané fotky pokroku.</p>`;
                    return;
                }
                
                photos.sort((a, b) => b.id.localeCompare(a.id));

                grid.innerHTML = photos.map(photo => `
                    <div class="relative group aspect-square rounded-2xl overflow-hidden glass-panel border border-white/5 active:opacity-70 transition-opacity">
                        <img src="${photo.dataUrl}" class="w-full h-full object-cover cursor-pointer" onclick="openFullPhotoRollout('${photo.id}')">
                        <div class="absolute bottom-0 inset-x-0 bg-black/75 p-2 text-center text-[10px] font-bold text-slate-300">
                            ${formatDateCzech(photo.date)}
                        </div>
                        <button onclick="deletePhotoConfirm('${photo.id}')" class="absolute top-2 right-2 w-8 h-8 rounded-full bg-black/60 active:bg-iosRed/85 text-white flex items-center justify-center transition-colors">
                            <i class="ph-bold ph-trash text-sm"></i>
                        </button>
                    </div>
                `).join('');
            });
        }

        function openFullPhotoRollout(photoId) {
            getAllPhotos().then(photos => {
                const photo = photos.find(p => p.id === photoId);
                if (!photo) return;
                const html = `
                    <div class="space-y-5 text-center">
                        <div class="flex justify-between items-center mb-2 px-2">
                            <span class="text-sm font-black text-iosTeal uppercase tracking-widest">${formatDateCzech(photo.date)}</span>
                            <button onclick="closeRollout()" class="w-10 h-10 rounded-full bg-white/5 text-slate-300 flex items-center justify-center active:opacity-50 transition-opacity"><i class="ph-bold ph-x text-xl"></i></button>

                        <div class="rounded-3xl overflow-hidden border border-white/10 glass-panel bg-black max-h-[50vh] flex items-center justify-center">
                            <img src="${photo.dataUrl}" class="max-h-[50vh] w-auto object-contain">

                        <p class="text-sm text-slate-400 italic">${photo.note || 'SvalStats Progress Capture'}</p>
                        <button onclick="deletePhotoConfirm('${photo.id}'); closeRollout();" class="w-full py-4 rounded-2xl bg-iosRed/15 border border-iosRed/30 text-iosRed font-bold text-base active:opacity-50 transition-opacity">Smazat fotku</button>
                    </div>
                `;
                openRollout(html);
            });
        }

        function deletePhotoConfirm(id) {
            showCustomConfirm("Smazat fotku?", "Opravdu si přejete smazat tuto fotku z galerie pokroku?", () => {
                getAllPhotos().then(photos => {
                    const photo = photos.find(p => p.id === id);
                    if (photo) {
                        const date = photo.date;
                        deletePhoto(id).then(() => {
                            getAllPhotos().then(updatedPhotos => {
                                const stillHasPhoto = updatedPhotos.some(p => p.date === date);
                                if (!stillHasPhoto && state.photoDates) {
                                    delete state.photoDates[date];
                                    saveState();
                                }
                                showToast("Fotka smazána");
                                loadPhotosAndRender();
                                if (state.currentTab === 'kalendar') renderView();
                            });
                        });
                    }
                });
            });
        }

                    </div>
                </div>

            openRollout(html);

            window.adjustRoller = (diff) => {
                let val = parseFloat(document.getElementById('roller-value').textContent) || 0;
                val = Math.max(0, parseFloat((val + diff).toFixed(2)));
                document.getElementById('roller-value').textContent = val;
                
                const textInput = document.getElementById('biometric-text-input');
                if (textInput) textInput.value = val;
            };
        };

        window.saveBiometricValue = (metricId) => {
            const targetDate = document.getElementById('biometric-date').value || getToday();
            const val = parseFloat(document.getElementById('roller-value').textContent);

            if (!state.biometrics[targetDate]) state.biometrics[targetDate] = {};
            state.biometrics[targetDate][metricId] = val;
            
            saveState();
            closeRollout(); 
            renderView();
            showToast("Záznam úspěšně uložen");
        };

        window.deleteBiometricHistorical = (metricId, date) => {
            if (state.biometrics[date] && state.biometrics[date][metricId] !== undefined) {
                delete state.biometrics[date][metricId];
                if (Object.keys(state.biometrics[date]).length === 0) delete state.biometrics[date];
                saveState();
                openBiometricRollout(metricId); 
                renderView();
                showToast("Historický záznam smazán");
            }
        };

        function getLastPerformedDate(dayId) {
            const dates = Object.keys(state.history).sort().reverse();
            for (const date of dates) {
                if (state.history[date][dayId]) return date;
            }
            return null;
        }

        window.toggleDayExpand = (dayId) => {
            expandedDayId = expandedDayId === dayId ? null : dayId;
            renderView();
        };

        window.cancelRetroactiveWorkout = () => {
            window.pendingRetroDate = null;
            renderView();
        };

        window.toggleActiveExCollapse = (ex) => {
            window.activeWorkoutCollapsed[ex] = !window.activeWorkoutCollapsed[ex];
            renderView();
        };

        function startWorkoutTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const timerEl = document.getElementById('workout-timer');
                if (timerEl && state.activeWorkout) {
                    const elapsed = Math.floor((Date.now() - state.activeWorkout.startTime) / 1000);
                    const minutes = String(Math.floor(elapsed / 60)).padStart(2, '0');
                    const seconds = String(elapsed % 60).padStart(2, '0');
                    if (timerEl) {
                        timerEl.textContent = `${minutes}:${seconds}`;
                    }
                } else {
                    clearInterval(timerInterval);
                }
            }, 1000);
        }

        function selectWorkoutDay(dayId) {
            const day = state.workoutDays.find(d => d.id === dayId);
            if (!day) return;
            
            const targetDate = window.pendingRetroDate || getToday();
            window.pendingRetroDate = null; 
            window.activeWorkoutCollapsed = {}; 

            state.activeWorkout = {
                dayId: dayId,
                name: day.name,
                color: day.color || 'cyan',
                startTime: Date.now(),
                targetDate: targetDate, 
                logs: {},
                notes: {} 
            };

            day.exercises.forEach(exObj => {
                const name = exObj.name;
                const setsCount = exObj.targetSets || 4;
                state.activeWorkout.logs[name] = Array.from({ length: setsCount }, () => ({ weight: '', reps: '' }));
                window.activeWorkoutCollapsed[name] = true;
            });

            saveState();
            startWorkoutTimer();
            renderView();
        }

                return `

            if (state.workoutDays.length === 0) {
                daysHtml = `

        function renderActiveWorkout(container) {
